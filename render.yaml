databases:
  - name: reviewsense-db
    databaseName: reviewsense
    user: reviewsense_user
    plan: starter
    region: ohio
    ipAllowList: []

services:
  # Redis Instance
  - type: redis
    name: reviewsense-redis
    plan: starter
    region: ohio
    ipAllowList: []

  # FastAPI Backend Web Service
  - type: web
    name: reviewsense-api
    env: docker
    plan: starter
    region: ohio
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reviewsense-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: reviewsense-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
